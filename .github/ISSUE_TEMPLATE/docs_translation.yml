name: Docs / Translation
description: 문서 번역 수정, 오타 제보, 표현 개선, 누락 제안을 남깁니다.
title: "[Docs] "
labels: ["documentation", "translation"]
body:
  - type: markdown
    attributes:
      value: |
        문서 개선 제안을 환영합니다.
        번역 오류, 오타, 표현 개선, 누락된 내용 등을 자유롭게 작성해주세요.

  - type: dropdown
    id: category
    attributes:
      label: 종류
      options:
        - 번역 수정
        - 오타 수정
        - 표현 개선
        - 문서 누락
        - 구조 개선
        - 기타
    validations:
      required: true

  - type: input
    id: target
    attributes:
      label: 대상 페이지 / 문서
      description: 어떤 문서인지 적어주세요.
      placeholder: 예) getting-started / configuration / rules
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: 현재 내용
      description: 문제가 되는 현재 문장이나 문단을 적어주세요.
      placeholder: 현재 번역 또는 원문 일부
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: 제안 내용
      description: 어떤 식으로 수정하면 좋을지 작성해주세요.
      placeholder: 수정 제안 문장
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: 이유
      description: 왜 이 수정이 필요한지 설명해주세요.
      placeholder: 예) 의미가 어색함 / 원문 의도와 다름 / 용어 통일 필요
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: 확인 사항
      options:
        - label: 기존 이슈에 같은 제안이 없는지 확인했습니다.
          required: true
        - label: 가능한 경우 직접 수정 PR도 열 의향이 있습니다.
          required: false