name: Feature request
description: 기능 추가, UX 개선, 문서 구조 개선 등을 제안합니다.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        새로운 기능이나 개선 아이디어를 제안해주세요.

  - type: input
    id: summary
    attributes:
      label: 제안 요약
      description: 무엇을 개선하고 싶은지 한 줄로 적어주세요.
      placeholder: 예) 문서 검색 기능을 강화하고 싶습니다.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 현재 불편한 점
      description: 지금 어떤 문제가 있는지 설명해주세요.
      placeholder: 예) 원하는 문서를 찾기 어렵습니다.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 제안하는 해결 방법
      description: 어떤 방식으로 개선하면 좋을지 적어주세요.
      placeholder: 예) 카테고리 필터 또는 검색 UI 추가
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 고려한 대안
      description: 다른 방법도 생각해봤다면 적어주세요.
      placeholder: 예) 사이드바 정리, 태그 시스템 등

  - type: textarea
    id: additional
    attributes:
      label: 추가 정보
      description: 레퍼런스, 예시, 화면 구상 등이 있다면 적어주세요.