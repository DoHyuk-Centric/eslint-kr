<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ESLint 한국어 가이드</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="%BASE_URL%css/style.css" />
    <link rel="stylesheet" href="%BASE_URL%css/components.css" />
    <link rel="icon" href="%BASE_URL%favicon.svg" />
    <style>
      /* 랜딩 전용 스타일 */
      .hero {
        background: var(--color-bg-secondary);
        border-bottom: 1px solid var(--color-border);
        padding: 4rem 3rem 3.5rem calc(var(--sidebar-width) + 3rem);
      }
      .hero h1 {
        font-size: 2.2rem;
        font-weight: 700;
        letter-spacing: -0.5px;
        margin-bottom: 0.8rem;
      }
      .hero p {
        font-size: 1rem;
        color: var(--color-muted);
        max-width: 560px;
        margin-bottom: 1.8rem;
        line-height: 1.7;
      }
      .hero-btns {
        display: flex;
        gap: 0.8rem;
        flex-wrap: wrap;
      }
      .btn {
        display: inline-block;
        padding: 0.6rem 1.2rem;
        border-radius: 5px;
        font-size: 0.9rem;
        font-weight: 700;
        font-family: var(--font);
        text-decoration: none;
        transition:
          background 0.15s,
          border-color 0.15s;
      }
      .btn-primary {
        background: var(--color-primary);
        color: #fff;
        border: 1px solid var(--color-primary);
      }
      .btn-primary:hover {
        background: var(--color-primary-hover);
        text-decoration: none;
      }
      .btn-secondary {
        background: var(--color-bg);
        color: var(--color-text);
        border: 1px solid var(--color-border);
      }
      .btn-secondary:hover {
        border-color: #aaa;
        text-decoration: none;
      }

      .docs-section {
        padding: 2.5rem 3rem;
        padding-left: calc(var(--sidebar-width) + 3rem);
        max-width: calc(var(--sidebar-width) + 820px);
      }
      .docs-section h2 {
        font-size: 1.1rem;
        font-weight: 700;
        margin-bottom: 1.2rem;
        color: var(--color-muted);
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 1px;
      }
      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 1rem;
      }
      .card {
        display: block;
        padding: 1.2rem 1.3rem;
        border: 1px solid var(--color-border);
        border-radius: 6px;
        text-decoration: none;
        color: inherit;
        background: var(--color-bg);
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
      }
      .card:hover {
        border-color: var(--color-primary);
        box-shadow: 0 2px 8px rgba(61, 115, 214, 0.08);
        text-decoration: none;
      }
      .card.disabled {
        opacity: 0.5;
        pointer-events: none;
        cursor: default;
      }
      .card-num {
        font-family: var(--font-mono);
        font-size: 0.7rem;
        color: var(--color-primary);
        margin-bottom: 0.4rem;
      }
      .card-title {
        font-size: 0.95rem;
        font-weight: 700;
        margin-bottom: 0.3rem;
      }
      .card-desc {
        font-size: 0.82rem;
        color: var(--color-muted);
        line-height: 1.5;
      }

      .notice {
        margin: 0 3rem 2rem calc(var(--sidebar-width) + 3rem);
        padding: 1rem 1.2rem;
        background: #fff8e6;
        border-left: 4px solid #f59e0b;
        border-radius: 0 4px 4px 0;
        font-size: 0.88rem;
        color: var(--color-text);
        line-height: 1.6;
      }
      .notice a {
        color: var(--color-primary);
      }

      @media (max-width: 768px) {
        .hero,
        .docs-section {
          padding-left: 1.2rem;
          padding-right: 1.2rem;
        }
        .notice {
          margin-left: 1.2rem;
          margin-right: 1.2rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
